name: Publish to PyPI and Sync Metadata

on:
  release:
    types: [published]

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/saetass

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update version in CITATION.cff
        run: |
          TAG=${GITHUB_REF_NAME#v}
          git checkout main
          sed -i "s/^version: .*/version: $TAG/" CITATION.cff
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          if git diff --staged --quiet; then
            echo "No changes to CITATION.cff"
          else
            git commit -m "Update version to $TAG in CITATION.cff [skip ci]"
            git push origin main
          fi

      - name: Install build tool
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
